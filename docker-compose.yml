version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: frescoo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: frescoo_admin
      POSTGRES_PASSWORD: frescoo_secret_2024
      POSTGRES_DB: frescoo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frescoo_admin -d frescoo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
